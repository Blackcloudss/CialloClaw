name: Tag Release

run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: tag-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Check out the tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Resolve the release tag version
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          release_tag="${GITHUB_REF_NAME}"
          release_version="${release_tag#v}"

          if [ -z "$release_version" ] || [ "$release_version" = "$release_tag" ]; then
            echo "The release tag must start with 'v' and include a version." >&2
            exit 1
          fi

          if [[ ! "$release_version" =~ ^([0-9]+\.[0-9]+\.[0-9]+)(-.+)?$ ]]; then
            echo "The release tag must resolve to a semver-like version." >&2
            exit 1
          fi

          release_core="${BASH_REMATCH[1]}"
          prerelease="${release_version#"$release_core"}"
          resolved_release_version="$release_version"

          if [ "$prerelease" != "$release_version" ]; then
            prerelease="${prerelease#-}"
            prerelease_valid=true
            IFS='.' read -r -a prerelease_parts <<< "$prerelease"

            for part in "${prerelease_parts[@]}"; do
              if [[ ! "$part" =~ ^[0-9]+$ ]] || (( 10#$part > 65535 )); then
                prerelease_valid=false
                break
              fi
            done

            if [ "$prerelease_valid" != true ]; then
              resolved_release_version="${release_core}-$(date -u +%y%j).$(date -u +%H%M).$(date -u +%S)"
            fi
          fi

          {
            echo "release_tag=$release_tag"
            echo "release_version=$resolved_release_version"
          } >> "$GITHUB_OUTPUT"

      - name: Prepare the desktop release payload
        id: prepare
        uses: ./.github/actions/desktop-release-prepare
        with:
          release_version: ${{ steps.meta.outputs.release_version }}

      - name: Compose release metadata
        id: release_meta
        shell: bash
        run: |
          {
            echo "release_body<<EOF"
            echo "## Release Metadata"
            echo
            echo "- Release tag: \`${{ steps.meta.outputs.release_tag }}\`"
            echo "- Release version: \`${{ steps.meta.outputs.release_version }}\`"
            echo "- Target SHA: \`${{ github.sha }}\`"
            echo "- Triggered by: \`${{ github.event_name }}\`"
            echo "- Bundled Go sidecar: \`${{ steps.prepare.outputs.sidecar_file_name }}\`"
            echo "- Preferred Windows installer: NSIS \`.exe\`"
            echo "- Secondary Windows installer: \`.msi\`"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish the tagged release
        id: publish
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm exec tauri
          tagName: ${{ steps.meta.outputs.release_tag }}
          releaseName: ${{ steps.meta.outputs.release_tag }}
          releaseBody: ${{ steps.release_meta.outputs.release_body }}
          releaseCommitish: ${{ github.sha }}
          generateReleaseNotes: true
          retryAttempts: 2
          args: --bundles nsis,msi

      - name: Write release summary
        shell: bash
        run: |
          {
            echo "## Published Tagged Release"
            echo
            echo "- Release URL: ${{ steps.publish.outputs.releaseHtmlUrl }}"
            echo "- Release ID: \`${{ steps.publish.outputs.releaseId }}\`"
            echo "- App version: \`${{ steps.publish.outputs.appVersion }}\`"
            echo "- Target SHA: \`${{ github.sha }}\`"
            echo "- Bundled Go sidecar: \`${{ steps.prepare.outputs.sidecar_file_name }}\`"
            if [ -n "${{ steps.publish.outputs.artifactPaths }}" ]; then
              echo "- Uploaded assets:"
              while IFS= read -r asset; do
                if [ -n "$asset" ]; then
                  echo "  - \`$asset\`"
                fi
              done <<'EOF'
          ${{ steps.publish.outputs.artifactPaths }}
          EOF
            fi
          } >> "$GITHUB_STEP_SUMMARY"
