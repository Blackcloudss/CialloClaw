name: Check Go Project

on:
  push:
    branches: [ "test","main" ]
  pull_request:
    branches: [ "test","main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Check Go Project
        run: |
          cd ./cmd
          go mod tidy && go build
