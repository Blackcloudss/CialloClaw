name: Tip Build

run-name: >-
  Tip Build (${{
    github.event_name == 'push' && github.sha || github.ref_name
  }})

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tip-build
  cancel-in-progress: true

jobs:
  release-tip:
    if: github.ref == 'refs/heads/main'
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Check out the current main commit
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri -> target

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
          cache-dependency-path: go.sum

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve the tip build version and compare link
        id: meta
        shell: bash
        env:
          PREVIOUS_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          short_sha="${GITHUB_SHA::7}"
          base_version=$(node -p "JSON.parse(require('node:fs').readFileSync('apps/desktop/package.json', 'utf8')).version")
          tip_version="${base_version}-tip.${GITHUB_RUN_NUMBER}"
          compare_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}"

          if [ -n "${PREVIOUS_SHA:-}" ] && [ "$PREVIOUS_SHA" != "0000000000000000000000000000000000000000" ]; then
            compare_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${PREVIOUS_SHA}...${GITHUB_SHA}"
          fi

          {
            echo "base_version=$base_version"
            echo "tip_version=$tip_version"
            echo "short_sha=$short_sha"
            echo "compare_url=$compare_url"
          } >> "$GITHUB_OUTPUT"

      - name: Rewrite the desktop version in release manifests
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.tip_version }}
        run: |
          node -e "
          const fs = require('node:fs');
          const version = process.env.RELEASE_VERSION;

          const packageJsonPath = 'apps/desktop/package.json';
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));
          packageJson.version = version;
          fs.writeFileSync(packageJsonPath, JSON.stringify(packageJson, null, 2) + '\n');

          const tauriConfigPath = 'apps/desktop/src-tauri/tauri.conf.json';
          const tauriConfig = JSON.parse(fs.readFileSync(tauriConfigPath, 'utf8'));
          tauriConfig.version = version;
          fs.writeFileSync(tauriConfigPath, JSON.stringify(tauriConfig, null, 2) + '\n');

          const cargoTomlPath = 'apps/desktop/src-tauri/Cargo.toml';
          let cargoToml = fs.readFileSync(cargoTomlPath, 'utf8');
          cargoToml = cargoToml.replace(/^version = \".*\"/m, 'version = \"' + version + '\"');
          fs.writeFileSync(cargoTomlPath, cargoToml);
          "

      - name: Verify rewritten release manifests
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.meta.outputs.tip_version }}
        run: |
          node -e "
          const fs = require('node:fs');
          const version = process.env.RELEASE_VERSION;

          const packageJson = JSON.parse(fs.readFileSync('apps/desktop/package.json', 'utf8'));
          const tauriConfig = JSON.parse(fs.readFileSync('apps/desktop/src-tauri/tauri.conf.json', 'utf8'));
          const cargoToml = fs.readFileSync('apps/desktop/src-tauri/Cargo.toml', 'utf8');

          if (packageJson.version !== version) {
            throw new Error('apps/desktop/package.json was not rewritten to the tip build version.');
          }

          if (tauriConfig.version !== version) {
            throw new Error('apps/desktop/src-tauri/tauri.conf.json was not rewritten to the tip build version.');
          }

          if (!cargoToml.includes('version = \\\"' + version + '\\\"')) {
            throw new Error('apps/desktop/src-tauri/Cargo.toml was not rewritten to the tip build version.');
          }
          "

      - name: Run desktop checks
        run: |
          pnpm --dir apps/desktop lint
          pnpm --dir apps/desktop typecheck
          pnpm --dir apps/desktop test:dashboard
          pnpm --dir apps/desktop test:memory

      - name: Run local-service tests
        run: go test ./services/local-service/...

      - name: Build the local-service sidecar
        id: build_sidecar
        shell: pwsh
        run: |
          $targetTriple = (& rustc --print host-tuple).Trim()
          if ([string]::IsNullOrWhiteSpace($targetTriple)) {
            throw "Failed to determine the Rust target triple for the local-service sidecar."
          }

          $sidecarDirectory = "apps/desktop/src-tauri/binaries"
          New-Item -ItemType Directory -Force -Path $sidecarDirectory | Out-Null

          $sidecarFileName = "local-service-$targetTriple.exe"
          $sidecarPath = Join-Path $sidecarDirectory $sidecarFileName

          go build -trimpath -o $sidecarPath ./services/local-service/cmd/server

          if (-not (Test-Path -LiteralPath $sidecarPath)) {
            throw "The local-service sidecar was not built at $sidecarPath."
          }

          "sidecar_file_name=$sidecarFileName" >> $env:GITHUB_OUTPUT
          "sidecar_path=$sidecarPath" >> $env:GITHUB_OUTPUT

      - name: Replace the previous tip release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release delete tip --yes --cleanup-tag || true
          git push origin :refs/tags/tip || true

      - name: Compose tip release metadata
        id: release_meta
        shell: bash
        run: |
          {
            echo "release_body<<EOF"
            echo "## Tip Build Metadata"
            echo
            echo "- Release tag: \`tip\`"
            echo "- Release name: \`tip (${{ steps.meta.outputs.short_sha }})\`"
            echo "- Tip build version: \`${{ steps.meta.outputs.tip_version }}\`"
            echo "- Base desktop version: \`${{ steps.meta.outputs.base_version }}\`"
            echo "- Target SHA: \`${{ github.sha }}\`"
            echo "- Triggered by: \`${{ github.event_name }}\`"
            echo "- Bundled Go sidecar: \`${{ steps.build_sidecar.outputs.sidecar_file_name }}\`"
            echo "- Preferred Windows installer: NSIS \`.exe\`"
            echo "- Secondary Windows installer: \`.msi\`"
            echo "- Compare: ${{ steps.meta.outputs.compare_url }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish the tip release
        id: publish
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: tip
          releaseName: tip (${{ steps.meta.outputs.short_sha }})
          releaseBody: ${{ steps.release_meta.outputs.release_body }}
          releaseCommitish: ${{ github.sha }}
          prerelease: true
          retryAttempts: 2
          args: --bundles nsis,msi

      - name: Write tip release summary
        shell: bash
        run: |
          {
            echo "## Published Tip Build"
            echo
            echo "- Release URL: ${{ steps.publish.outputs.releaseHtmlUrl }}"
            echo "- Release ID: \`${{ steps.publish.outputs.releaseId }}\`"
            echo "- App version: \`${{ steps.publish.outputs.appVersion }}\`"
            echo "- Target SHA: \`${{ github.sha }}\`"
            echo "- Bundled Go sidecar: \`${{ steps.build_sidecar.outputs.sidecar_file_name }}\`"
            if [ -n "${{ steps.publish.outputs.artifactPaths }}" ]; then
              echo "- Uploaded assets:"
              while IFS= read -r asset; do
                if [ -n "$asset" ]; then
                  echo "  - \`$asset\`"
                fi
              done <<'EOF'
          ${{ steps.publish.outputs.artifactPaths }}
          EOF
            fi
          } >> "$GITHUB_STEP_SUMMARY"
